<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWings | Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
    </style>
</head>
<body class="text-white min-h-screen flex">

<main class="flex-1 p-8">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight">SkyWings <span class="text-blue-500">Admin</span></h1>
            <p class="text-white/50 mt-1">Controllo totale del sistema</p>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-right" th:if="${session.utente != null}">
                <p class="text-sm font-bold" th:text="${session.utente.nome + ' ' + session.utente.cognome}">Admin Name</p>
                <p class="text-xs text-blue-400">Livello di accesso: Root</p>
            </div>
            <a href="/logout" class="glass p-3 rounded-full hover:bg-red-500/20 transition">Logout</a>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">

        <div class="glass p-6 rounded-2xl hover:border-blue-500/50 transition">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-blue-500/20 rounded-xl text-blue-400 text-2xl">✈️</div>
                <span class="px-3 py-1 bg-blue-500/10 text-blue-400 rounded-full text-xs font-bold"
                      th:text="${countVoli} + ' Attivi'">0</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Voli</h3>
            <div class="flex space-x-2 mt-4">
                <a href="/admin/voli" class="flex-1 text-center bg-white/5 py-2 rounded-lg text-sm hover:bg-white/10">Gestisci</a>
                <a href="/admin/voli/nuovo" class="flex-1 text-center bg-blue-600 py-2 rounded-lg text-sm font-bold hover:bg-blue-500">+</a>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl hover:border-purple-500/50 transition">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-purple-500/20 rounded-xl text-purple-400 text-2xl">🛠️</div>
                <span class="px-3 py-1 bg-purple-500/10 text-purple-400 rounded-full text-xs font-bold"
                      th:text="${countAerei} + ' In Flotta'">0</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Aerei</h3>
            <div class="flex space-x-2 mt-4">
                <a href="/admin/aerei" class="flex-1 text-center bg-white/5 py-2 rounded-lg text-sm hover:bg-white/10">Gestisci</a>
                <a href="/admin/aerei/nuovo" class="flex-1 text-center bg-purple-600 py-2 rounded-lg text-sm font-bold hover:bg-purple-500">+</a>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl hover:border-red-500/50 transition">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-red-500/20 rounded-xl text-red-400 text-2xl">👥</div>
                <span class="px-3 py-1 bg-red-500/10 text-red-400 rounded-full text-xs font-bold"
                      th:text="${countUtenti} + ' Iscritti'">0</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Utenti</h3>
            <div class="flex space-x-2 mt-4">
                <a href="/admin/utenti" class="flex-1 text-center bg-white/5 py-2 rounded-lg text-sm hover:bg-white/10">Gestisci</a>
                <a href="/admin/utenti/nuovo" class="flex-1 text-center bg-red-600 py-2 rounded-lg text-sm font-bold hover:bg-red-500">+</a>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl hover:border-green-500/50 transition">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-green-500/20 rounded-xl text-green-400 text-2xl">🌍</div>
                <span class="px-3 py-1 bg-green-500/10 text-green-400 rounded-full text-xs font-bold"
                      th:text="${countCitta} + ' Città'">0</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Città</h3>
            <div class="flex space-x-2 mt-4">
                <a href="/admin/citta" class="flex-1 text-center bg-white/5 py-2 rounded-lg text-sm hover:bg-white/10">Gestisci</a>
                <a href="/admin/citta/nuova" class="flex-1 text-center bg-green-600 py-2 rounded-lg text-sm font-bold hover:bg-green-500">+</a>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl hover:border-yellow-500/50 transition">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-yellow-500/20 rounded-xl text-yellow-400 text-2xl">👨‍✈️</div>
                <span class="px-3 py-1 bg-yellow-500/10 text-yellow-400 rounded-full text-xs font-bold"
                      th:text="${countEquipaggio} + ' Staff'">0</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Equipaggio</h3>
            <div class="flex space-x-2 mt-4">
                <a href="/admin/equipaggio" class="flex-1 text-center bg-white/5 py-2 rounded-lg text-sm hover:bg-white/10">Gestisci</a>
                <a href="/admin/equipaggio/nuovo" class="flex-1 text-center bg-yellow-600 py-2 rounded-lg text-sm font-bold hover:bg-yellow-500">+</a>
            </div>
        </div>

    </div>

    <div class="mt-12 glass p-4 rounded-xl inline-flex items-center space-x-3">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        <span class="text-xs font-mono text-white/40 uppercase tracking-widest">SkyWings System Active // Database: Linked</span>
    </div>

</main>
</body>
</html>
