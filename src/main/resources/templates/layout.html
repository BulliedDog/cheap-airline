<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:fragment="html(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'SkyWings Airlines'">SkyWings Airlines</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Outfit', sans-serif; transition: all 0.2s ease; }
        .font-mono { font-family: 'Space Mono', monospace; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); }
        .accent-gradient {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            background-size: 200% 200%;
            animation: gradient-shift 1s ease infinite;
        }
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">

<nav class="glass sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <a href="/" class="flex items-center space-x-2 group">
                <div class="w-32 h-20">
                    <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                        <defs>
                            <linearGradient id="skywings-gradient-final" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#3b82f6">
                                    <animate attributeName="stop-color"
                                             values="#3b82f6; #a855f7; #10b981; #3b82f6"
                                             dur="4s" repeatCount="indefinite" />
                                </stop>
                                <stop offset="100%" stop-color="#10b981">
                                    <animate attributeName="stop-color"
                                             values="#10b981; #3b82f6; #a855f7; #10b981"
                                             dur="4s" repeatCount="indefinite" />
                                </stop>
                            </linearGradient>

                            <filter id="glow-simple" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.2" result="blur" />
                                <feMerge>
                                    <feMergeNode in="blur" />
                                    <feMergeNode in="SourceGraphic" />
                                </feMerge>
                            </filter>
                        </defs>

                        <g class="floating-animation" fill="none" stroke="url(#skywings-gradient-final)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="filter: url(#glow-simple);">

                            <path d="M15,30 C15,22 22,20 30,20 L85,20 C95,20 100,25 100,30 C100,35 95,40 85,40 L30,40 C22,40 15,38 15,30 Z" />

                            <path d="M22,28 C22,23 26,21 32,21 L38,21 L35,28 Z" stroke-width="1.5" />

                            <path d="M50,40 L70,55 L90,55 L75,40" />

                            <path d="M85,20 L95,8 L105,8 L98,20" />

                            <g stroke-width="1">
                                <circle cx="48" cy="30" r="1.2" />
                                <circle cx="56" cy="30" r="1.2" />
                                <circle cx="64" cy="30" r="1.2" />
                                <circle cx="72" cy="30" r="1.2" />
                                <circle cx="80" cy="30" r="1.2" />
                            </g>
                        </g>

                        <style>
                            @keyframes float-plane {
                                0%, 100% { transform: translateY(0px) rotate(0deg); }
                                50% { transform: translateY(-3px) rotate(-0.5deg); }
                            }
                            .floating-animation {
                                animation: float-plane 3s ease-in-out infinite;
                                transform-origin: center;
                            }
                        </style>
                    </svg>
                </div>
                <span class="text-xl font-bold font-mono">SkyWings</span>
            </a>

            <div class="hidden md:flex items-center space-x-8">
                <a href="/" class="hover:text-blue-400 font-medium">Home</a>
                <a href="/flights/search" class="hover:text-blue-400 font-medium">Book Flights</a>
                <a href="/bookings" class="hover:text-blue-400 font-medium">My Bookings</a>

                <div class="flex items-center space-x-4">
                    <a th:if="${utente == null}" href="/login" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 rounded-lg">Login</a>
                    <a th:if="${utente != null}" href="/logout" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 rounded-lg">Logout</a>
                </div>

                <div th:if="${utente?.ruolo == 'ADMIN'}" class="flex items-center space-x-4">
                    <a href="/admin" class="px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg">
                        Administration
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div th:replace="~{::content}"></div>
</main>

<footer class="glass mt-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-center text-sm text-gray-400">
        <p>&copy; 2026 SkyWings Airlines. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
