<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html('Flight Details - ' + ${volo.codiceVolo}, ~{::content})}">
<body>
<th:block th:fragment="content">

    <div class="mb-8">
        <a href="/" class="text-gray-400 hover:text-white flex items-center gap-2 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            Back to Flights
        </a>
    </div>

    <div class="glass rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl mb-12">
        <div class="accent-gradient p-1 px-1"> <div class="bg-slate-900/90 rounded-[2.9rem] p-8 md:p-12">

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
                <div>
                        <span class="px-4 py-2 bg-blue-500/20 text-blue-400 rounded-full text-xs font-bold uppercase tracking-widest"
                              th:text="${volo.stato}"></span>
                    <h1 class="text-5xl font-black mt-4 italic" th:text="${volo.codiceVolo}"></h1>
                </div>
                <div class="text-right">
                    <div th:if="${volo.prezzoBase != volo.prezzoCalcolato}" class="mb-1">
                        <p class="text-gray-500 uppercase text-[10px] tracking-widest">Standard Fare</p>
                        <p class="text-xl font-medium text-gray-500 line-through"
                           th:text="${#numbers.formatDecimal(volo.prezzoBase, 1, 2)} + ' €'"></p>
                    </div>

                    <p class="text-gray-400 uppercase text-xs tracking-tighter"
                       th:text="${volo.prezzoBase != volo.prezzoCalcolato} ? 'Special Offer Price' : 'Fare Starting At'"></p>
                    <p class="text-5xl font-black text-emerald-400"
                       th:text="${#numbers.formatDecimal(volo.prezzoCalcolato, 1, 2)} + ' €'"></p>
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-between gap-12 mb-16 relative">
                <div class="text-center md:text-left flex-1">
                    <p class="text-6xl font-black text-white mb-2"
                       th:text="${nomiCitta.get(volo.idCittaPartenza)}"></p>
                    <p class="text-xl text-blue-400 font-mono"
                       th:text="${#temporals.format(volo.orarioPartenza, 'HH:mm')}"></p>
                    <p class="text-gray-500" th:text="${#temporals.format(volo.orarioPartenza, 'dd MMM yyyy')}"></p>
                </div>

                <div class="relative flex items-center justify-center w-full md:w-auto">
                    <div class="hidden md:block absolute w-64 h-[2px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                    <div class="bg-slate-800 p-4 rounded-full border border-white/10 relative z-10 shadow-xl">
                        <svg class="w-10 h-10 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
                    </div>
                </div>

                <div class="text-center md:text-right flex-1">
                    <p class="text-6xl font-black text-white mb-2"
                       th:text="${nomiCitta.get(volo.idCittaArrivo)}"></p>
                    <p class="text-xl text-purple-400 font-mono"
                       th:text="${#temporals.format(volo.orarioArrivo, 'HH:mm')}"></p>
                    <p class="text-gray-500" th:text="${#temporals.format(volo.orarioArrivo, 'dd MMM yyyy')}"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-2 gap-6 border-t border-white/5 pt-12">
                <div class="glass p-6 rounded-3xl border-white/5">
                    <p class="text-gray-500 text-xs uppercase mb-2">Duration</p>
                    <p th:text="${volo.getDurataFormattata()}" class="text-xl font-bold italic">--h --m</p> </div>
                <div class="glass p-6 rounded-3xl border-white/5">
                    <p class="text-gray-500 text-xs uppercase mb-2">Baggage</p>
                    <p class="text-xl font-bold text-emerald-400 italic">Included</p>
                </div>
            </div>
        </div>
        </div>
    </div>

    <div class="mt-12">

        <div th:if="${errore != null}" class="bg-red-500/20 border border-red-500 text-red-100 p-4 rounded-xl mb-6 font-semibold shadow-lg" th:text="${errore}"></div>
        <div th:if="${successo != null}" class="bg-emerald-500/20 border border-emerald-500 text-emerald-100 p-4 rounded-xl mb-6 font-semibold shadow-lg" th:text="${successo}"></div>

        <div th:if="${volo.stato.toString() == 'PROGRAMMATO'}" class="flex justify-center mt-12">

            <a th:if="${utente == null}" href="/login"
               class="inline-block px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-xl hover:scale-105 transition-all shadow-lg text-center">
                Proceed with selection (Login Required)
            </a>

            <button th:if="${utente != null}" type="button"
                    onclick="document.getElementById('bookingSection').classList.toggle('hidden')"
                    class="px-8 py-4 bg-gradient-to-r from-emerald-500 to-emerald-700 text-white font-bold rounded-xl hover:scale-[1.02] transition-all shadow-lg shadow-emerald-500/20">
                Proceed with selection
            </button>

        </div>

        <div id="bookingSection" class="hidden mt-8 glass p-8 rounded-3xl border border-white/10 shadow-2xl relative overflow-hidden">
            <h3 class="text-2xl font-bold mb-6 text-white relative z-10">Passenger Details</h3>

            <form th:action="@{/prenotazioni/book}" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                <input type="hidden" name="voloId" th:value="${volo.id}">

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">First Name</label>
                    <input type="text" name="nomePasseggero" required class="bg-black/20 border border-white/10 text-white rounded-xl p-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Last Name</label>
                    <input type="text" name="cognomePasseggero" required class="bg-black/20 border border-white/10 text-white rounded-xl p-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Class</label>
                    <select name="classe" required class="bg-black/20 border border-white/10 text-white rounded-xl p-3 focus:border-purple-500 outline-none appearance-none cursor-pointer">
                        <option value="Economy" class="text-black">Economy</option>
                        <option value="Business" class="text-black">Business</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Seat (e.g. 12A)</label>
                    <input type="text" name="posto" required placeholder="Choose your seat manually" class="bg-black/20 border border-white/10 text-white rounded-xl p-3 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition-all">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Document Number</label>
                    <input type="text" name="numeroDocumento" required placeholder="Passport or ID" class="bg-black/20 border border-white/10 text-white rounded-xl p-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div class="md:col-span-2 mt-4">
                    <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-colors uppercase tracking-widest text-sm shadow-lg">
                        Confirm Booking
                    </button>
                </div>
            </form>
        </div>
    </div>

</th:block>
</body>
</html>
