<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html('Flight Details - ' + ${volo.codiceVolo}, ~{::content})}">
<body>
<th:block th:fragment="content">

    <div class="mb-8">
        <a href="/" class="text-gray-400 hover:text-white flex items-center gap-2 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            Back to Flights
        </a>
    </div>

    <div class="glass rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl mb-12">
        <div class="accent-gradient p-1 px-1"> <div class="bg-slate-900/90 rounded-[2.9rem] p-8 md:p-12">

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-12">
                <div>
                        <span class="px-4 py-2 bg-blue-500/20 text-blue-400 rounded-full text-xs font-bold uppercase tracking-widest"
                              th:text="${volo.stato}"></span>
                    <h1 class="text-5xl font-black mt-4 italic" th:text="${volo.codiceVolo}"></h1>
                </div>
                <div class="text-right">
                    <p class="text-gray-400 uppercase text-xs tracking-tighter">Base Fare Starting At</p>
                    <p class="text-4xl font-bold text-emerald-400" th:text="${volo.prezzoBase} + ' €'"></p>
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-between gap-12 mb-16 relative">
                <div class="text-center md:text-left flex-1">
                    <p class="text-6xl font-black text-white mb-2"
                       th:text="${nomiCitta.get(volo.idCittaPartenza)}"></p>
                    <p class="text-xl text-blue-400 font-mono"
                       th:text="${#temporals.format(volo.orarioPartenza, 'HH:mm')}"></p>
                    <p class="text-gray-500" th:text="${#temporals.format(volo.orarioPartenza, 'dd MMM yyyy')}"></p>
                </div>

                <div class="relative flex items-center justify-center w-full md:w-auto">
                    <div class="hidden md:block absolute w-64 h-[2px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                    <div class="bg-slate-800 p-4 rounded-full border border-white/10 relative z-10 shadow-xl">
                        <svg class="w-10 h-10 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
                    </div>
                </div>

                <div class="text-center md:text-right flex-1">
                    <p class="text-6xl font-black text-white mb-2"
                       th:text="${nomiCitta.get(volo.idCittaArrivo)}"></p>
                    <p class="text-xl text-purple-400 font-mono"
                       th:text="${#temporals.format(volo.orarioArrivo, 'HH:mm')}"></p>
                    <p class="text-gray-500" th:text="${#temporals.format(volo.orarioArrivo, 'dd MMM yyyy')}"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-2 gap-6 border-t border-white/5 pt-12">
                <div class="glass p-6 rounded-3xl border-white/5">
                    <p class="text-gray-500 text-xs uppercase mb-2">Duration</p>
                    <p th:text="${volo.getDurataFormattata()}" class="text-xl font-bold italic">--h --m</p> </div>
                <div class="glass p-6 rounded-3xl border-white/5">
                    <p class="text-gray-500 text-xs uppercase mb-2">Baggage</p>
                    <p class="text-xl font-bold text-emerald-400 italic">Included</p>
                </div>
            </div>
        </div>
        </div>
    </div>

    <div class="flex justify-center mb-24">
        <button class="px-16 py-6 bg-white text-slate-900 rounded-3xl font-black text-2xl hover:bg-blue-400 hover:text-white transition-all transform hover:-translate-y-2 shadow-2xl shadow-white/10">
            PROCEED TO SELECTION
        </button>
    </div>

</th:block>
</body>
</html>
