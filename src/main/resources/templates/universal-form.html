<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(${azione}, ~{::content})}">
<body>
<th:block th:fragment="content">

    <div class="max-w-3xl mx-auto mt-10">

        <div class="mb-8">
            <h1 class="text-4xl font-bold text-white" th:text="${azione}">Nuovo Record</h1>
            <p class="text-gray-400 mt-2">Compila i campi sottostanti per salvare le informazioni nel database.</p>
        </div>

        <div class="glass p-8 rounded-2xl border border-white/10 shadow-2xl">

            <form th:action="@{'/admin/' + ${modelName} + '/save'}" th:object="${entity}" method="POST" class="space-y-6">

                <input th:if="${modelName != 'equipaggi'}" type="hidden" th:field="*{id}" />

                <th:block th:if="${modelName == 'aerei'}">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Modello Aereo</label>
                            <input type="text" th:field="*{modello}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Produttore</label>
                            <input type="text" th:field="*{produttore}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Posti Economy</label>
                            <input type="number" th:field="*{capacitaEconomy}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Posti Business</label>
                            <input type="number" th:field="*{capacitaBusiness}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                    </div>
                </th:block>

                <th:block th:if="${modelName == 'citta'}">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label class="block text-gray-400 text-sm font-bold mb-2">Nome Città</label>
                            <input type="text" th:field="*{nome}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Nazione</label>
                            <input type="text" th:field="*{nazione}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Codice IATA (es. MXP, FCO)</label>
                            <input type="text" th:field="*{codiceIata}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white uppercase" maxlength="3" required>
                        </div>
                    </div>
                </th:block>

                <th:block th:if="${modelName == 'voli'}">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Codice Volo</label>
                            <input type="text" th:field="*{codiceVolo}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white uppercase" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Stato Volo</label>
                            <select th:field="*{stato}" class="w-full bg-gray-800 border border-white/10 rounded-xl p-3 text-white" required>
                                <option value="PROGRAMMATO">Programmato</option>
                                <option value="IN_VOLO">In Volo</option>
                                <option value="ATTERRATO">Atterrato</option>
                                <option value="CANCELLATO">Cancellato</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Orario Partenza</label>
                            <input type="datetime-local" th:field="*{orarioPartenza}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Orario Arrivo</label>
                            <input type="datetime-local" th:field="*{orarioArrivo}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-gray-400 text-sm font-bold mb-2">Prezzo Base (€)</label>
                            <input type="number" step="0.01" th:field="*{prezzoBase}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                    </div>
                </th:block>

                <th:block th:if="${modelName == 'utenti'}">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Nome</label>
                            <input type="text" th:field="*{nome}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Cognome</label>
                            <input type="text" th:field="*{cognome}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Username</label>
                            <input type="text" th:field="*{username}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Ruolo</label>
                            <select th:field="*{ruolo}" class="w-full bg-gray-800 border border-white/10 rounded-xl p-3 text-white" required>
                                <option value="USER">Utente Base</option>
                                <option value="ADMIN">Amministratore</option>
                                <option value="CREW">Membro Equipaggio</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-gray-400 text-sm font-bold mb-2">Email</label>
                            <input type="email" th:field="*{email}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                    </div>
                </th:block>

                <th:block th:if="${modelName == 'equipaggi'}">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">ID Volo</label>
                            <input type="number" th:field="*{idVolo}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">ID Utente (Membro Crew)</label>
                            <input type="number" th:field="*{idUtente}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                    </div>
                </th:block>

                <th:block th:if="${modelName == 'prenotazioni'}">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Nome Passeggero</label>
                            <input type="text" th:field="*{nomePasseggero}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Cognome Passeggero</label>
                            <input type="text" th:field="*{cognomePasseggero}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Prezzo Acquistato (€)</label>
                            <input type="number" step="0.01" th:field="*{prezzoAcquistato}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                        <div>
                            <label class="block text-gray-400 text-sm font-bold mb-2">Posto (es. 14A)</label>
                            <input type="text" th:field="*{posto}" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" required>
                        </div>
                    </div>
                </th:block>

                <div class="pt-6 border-t border-white/10 flex justify-end gap-4 mt-8">
                    <a th:href="@{'/admin/' + ${modelName}}" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-bold rounded-xl transition">
                        Annulla
                    </a>
                    <button type="submit" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition shadow-lg">
                        Salva Dati
                    </button>
                </div>

            </form>
        </div>
    </div>

</th:block>
</body>
</html>
